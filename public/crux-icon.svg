<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Corner ambient glows -->
    <radialGradient id="ambLeft" cx="20%" cy="20%" r="52%">
      <stop offset="0%"   stop-color="#6366F1" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#07070B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambRight" cx="80%" cy="80%" r="45%">
      <stop offset="0%"   stop-color="#2DD4BF" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#07070B" stop-opacity="0"/>
    </radialGradient>

    <!-- Bar glow -->
    <filter id="indigoGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="11" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tealGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="11" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Center glow layers -->
    <filter id="outerBloom" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="44"/>
    </filter>
    <filter id="midBloom" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
    <filter id="coreGlow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="500" height="500" rx="112" fill="#07070B"/>
  <rect width="500" height="500" rx="112" fill="url(#ambLeft)"/>
  <rect width="500" height="500" rx="112" fill="url(#ambRight)"/>

  <!--
    TWO CAPSULE BARS forming an X
    Each bar: 296 × 54px, rx=27 (full stadium/capsule)
    Centered at (250, 250):  x = 250-148 = 102,  y = 250-27 = 223
    Bar 1 → Indigo  \  rotate(+43°)
    Bar 2 → Teal    /  rotate(-43°)
  -->

  <!-- Indigo bar — dominant brand color -->
  <rect x="102" y="223" width="296" height="54" rx="27"
    transform="rotate(43 250 250)"
    fill="#6366F1"
    filter="url(#indigoGlow)"/>

  <!-- Teal bar — accent -->
  <rect x="102" y="223" width="296" height="54" rx="27"
    transform="rotate(-43 250 250)"
    fill="#2DD4BF"
    opacity="0.85"
    filter="url(#tealGlow)"/>

  <!--
    CENTER FOCAL POINT — The "crux" itself
    Layered bloom system: outer → mid → inner glow → sharp core
  -->
  <circle cx="250" cy="250" r="88"  fill="white" opacity="0.055" filter="url(#outerBloom)"/>
  <circle cx="250" cy="250" r="44"  fill="white" opacity="0.10"  filter="url(#midBloom)"/>
  <circle cx="250" cy="250" r="22"  fill="white" opacity="0.50"  filter="url(#coreGlow)"/>
  <circle cx="250" cy="250" r="10"  fill="white" opacity="0.96"/>

</svg>
